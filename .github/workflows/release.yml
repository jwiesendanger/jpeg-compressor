name: Build and Release

# Triggers when you push a version tag, e.g.: git tag v1.0.1 && git push origin v1.0.1
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PS2EXE
        shell: pwsh
        run: Install-Module ps2exe -Force -Scope CurrentUser -ErrorAction Stop

      - name: Build EXE
        shell: pwsh
        run: |
          Import-Module ps2exe -Force -ErrorAction Stop
          $version = "${{ github.ref_name }}".TrimStart('v')
          Invoke-ps2exe -inputFile "jpeg-compress.ps1" -outputFile "jpeg-compress.exe" -noConsole -title "JPEG Compressor" -description "Compress a JPEG to a target file size" -company "jwiesendanger" -version $version
          if (-not (Test-Path "jpeg-compress.exe")) { throw "Build failed: jpeg-compress.exe was not created" }
          Write-Host "EXE built successfully. Size: $((Get-Item jpeg-compress.exe).Length) bytes"

      - name: Create Release and upload EXE
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag   = "${{ github.ref_name }}"
          $repo  = "${{ github.repository }}"
          $auth  = "Bearer $env:GH_TOKEN"
          $base  = "https://api.github.com/repos/$repo"

          # Delete existing release if present
          $existing = Invoke-RestMethod "$base/releases/tags/$tag" -Headers @